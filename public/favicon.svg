<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="#0D0D0D"/>

  <!-- Red glow border -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="none"
        stroke="#FF3B30" stroke-width="3.5" filter="url(#glow)" opacity="0.9"/>

  <!-- Crossed swords icon (centered, scaled from 24x24 viewBox to ~56x56) -->
  <g transform="translate(50,50) scale(2.4) translate(-12,-12)" stroke="#FF3B30" stroke-width="1.8"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="14.5,17.5 3,6 3,3 6,3 17.5,14.5"/>
    <line x1="13" y1="19" x2="19" y2="13"/>
    <line x1="16" y1="16" x2="20" y2="20"/>
    <line x1="19" y1="21" x2="21" y2="19"/>
    <polyline points="14.5,6.5 18,3 21,3 21,6 17.5,9.5"/>
    <line x1="5" y1="14" x2="8" y2="17"/>
    <line x1="3" y1="21" x2="5" y2="19"/>
  </g>
</svg>
